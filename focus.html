<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus — Rowan Clyne</title>
  <meta name="description" content="Media strategy, brand communications, talent representation, and entertainment publicity. What we do, and how we do it." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#202A36" />
  <link rel="canonical" href="https://www.rowanclyne.com/focus" />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Focus — Rowan Clyne" />
  <meta property="og:description" content="Media strategy, brand communications, talent representation, and entertainment publicity." />
  <meta property="og:url" content="https://www.rowanclyne.com/focus" />
  <meta property="og:image" content="https://www.rowanclyne.com/uploads/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Focus — Rowan Clyne" />
  <meta name="twitter:description" content="Media strategy, brand communications, talent representation, and entertainment publicity." />
  <meta name="twitter:image" content="https://www.rowanclyne.com/uploads/og-image.jpg" />
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23202A36'/><text y='72' x='50' text-anchor='middle' font-size='58' font-family='serif' fill='white'>R</text></svg>" />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #202A36; }

    .nav-link {
      position: relative;
      color: #202A36;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .nav-link:hover { color: #4b5563; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up { opacity: 0; }
    .fade-up.visible { animation: fadeUp 0.7s ease forwards; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .menu-enter { animation: slideIn 0.22s ease both; }

    .service-item {
      border-top: 1px solid #e5e7eb;
      padding: 56px 0;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .service-item {
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 40px 0;
      }
    }

    .service-number {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: #9ca3af;
      text-transform: uppercase;
      padding-top: 6px;
    }

    .service-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 700;
      color: #202A36;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .service-body {
      font-size: 1rem;
      color: #4b5563;
      line-height: 1.8;
      font-weight: 400;
      max-width: 560px;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #6b7280;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s ease;
    }
    .btn-back:hover { color: #202A36; }

    .hamburger-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #202A36;
      display: flex;
      align-items: center;
      padding: 4px;
    }

    .dropdown {
      position: absolute;
      top: 70px;
      right: 32px;
      background: rgba(255,255,255,0.50);
      backdropFilter: blur(12px);
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      padding: 8px 0;
      min-width: 160px;
      overflow: hidden;
      z-index: 100;
    }

    .dropdown a {
      display: block;
      padding: 12px 24px;
      color: #111827;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: right;
      transition: background 0.15s ease;
    }
    .dropdown a:hover { background: rgba(0,0,0,0.04); }

    .page-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    .page-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      color: #202A36;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SERVICES = [
      {
        title: 'Media Strategy',
        body: 'From launches to the deep work of reputation building, we build press interest that earns attention you actually want. And we know when silence serves you better than clicks.',
      },
      {
        title: 'Brand Communications',
        body: 'Your brand is the sum of every choice it makes in public. We help clients clarify what they stand for and say it consistently across press, partnerships, and socials.',
      },
      {
        title: 'Talent Representation',
        body: 'We represent artists, executives, and public figures whose careers require more than quiet work. Through profile building, crisis navigation, and the quieter craft of protecting a client\'s time and image, we help shape how the world sees you.',
      },
      {
        title: 'Entertainment Publicity',
        body: 'From unit publicity to festival premieres, we create and manage interest to shape it into campaigns built for film and television.',
      },
    ];

    function useFadeUp() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
        }, { threshold: 0.15 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    function ServiceItem({ title, body, index }) {
      const ref = useFadeUp();
      return (
        <div ref={ref} className="service-item fade-up" style={{ animationDelay: `${index * 0.1}s` }}>
          <div>
            <div className="service-number">{String(index + 1).padStart(2, '0')}</div>
          </div>
          <div>
            <div className="service-title">{title}</div>
            <p className="service-body">{body}</p>
          </div>
        </div>
      );
    }

    function App() {
      const [menuOpen, setMenuOpen] = useState(false);
      const heroRef = useFadeUp();

      return (
        <div style={{ minHeight: '100vh', background: '#f9fafb' }}>

          {/* NAV */}
          <nav style={{ position: 'relative', zIndex: 10 }}>
            <div style={{
              maxWidth: '72rem',
              margin: '0 auto',
              padding: '24px 32px',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
            }}>
              {/* Back / Brand */}
              <a href="index.html" className="btn-back">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
                Rowan Clyne
              </a>

              {/* Hamburger */}
              <button
                className="hamburger-btn"
                onClick={() => setMenuOpen(o => !o)}
                aria-label="Toggle menu"
              >
                {menuOpen
                  ? <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  : <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                }
              </button>

              {/* Dropdown */}
              {menuOpen && (
                <div className="menu-enter dropdown">
                  {['Focus', 'Philosophy', 'Contact'].map(item => (
                    <a key={item} href={`${item.toLowerCase()}.html`}>{item}</a>
                  ))}
                </div>
              )}
            </div>
          </nav>

          {/* HERO */}
          <header style={{ maxWidth: '72rem', margin: '0 auto', padding: '64px 32px 80px' }}>
            <div ref={heroRef} className="fade-up">
              <p className="page-label">Focus</p>
              <h1 className="page-headline">What we do.</h1>
            </div>
          </header>

          {/* SERVICES */}
          <main style={{ maxWidth: '72rem', margin: '0 auto', padding: '0 32px 120px' }}>
            {SERVICES.map((s, i) => (
              <ServiceItem key={s.title} title={s.title} body={s.body} index={i} />
            ))}
          </main>

          {/* FOOTER */}
          <footer style={{
            borderTop: '1px solid #e5e7eb',
            padding: '24px 32px',
            textAlign: 'center',
          }}>
            <p style={{ fontSize: '0.75rem', color: '#9ca3af', letterSpacing: '0.04em' }}>
              © Rowan Clyne Publicity
            </p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
