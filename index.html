<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rowan Clyne — Publicity & Media Strategy</title>
  <meta name="description" content="A boutique publicity firm shaping the limelight since 1981. Brand communications, talent representation, media strategy, and entertainment publicity." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#202A36" />
  <link rel="canonical" href="https://www.rowanclyne.com/" />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Rowan Clyne" />
  <meta property="og:description" content="A legacy firm shaping the future of media." />
  <meta property="og:url" content="https://www.rowanclyne.com/" />
  <meta property="og:image" content="https://www.rowanclyne.com/uploads/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Rowan Clyne" />
  <meta name="twitter:description" content="A legacy firm shaping the future of media." />
  <meta name="twitter:image" content="https://www.rowanclyne.com/uploads/og-image.jpg" />
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23202A36'/><text y='72' x='50' text-anchor='middle' font-size='58' font-family='serif' fill='white'>R</text></svg>" />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; }

    .nav-link {
      position: relative;
      color: #111827;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-decoration: none;
      transition: color 0.2s ease;
      padding-bottom: 2px;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: #202A36;
      transition: width 0.25s ease;
    }
    .nav-link:hover { color: #374151; }
    .nav-link:hover::after { width: 100%; }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(249,250,251,0.0) 0%,
        rgba(249,250,251,0.12) 50%,
        rgba(249,250,251,0.80) 85%,
        rgba(249,250,251,1.0) 100%
      );
    }

    .btn-discover {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      border-radius: 9999px;
      background: rgba(209,213,219,0.85);
      color: #1f2937;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      backdrop-filter: blur(4px);
    }
    .btn-discover:hover {
      background: rgba(156,163,175,0.9);
      transform: translateY(-1px);
    }

    .btn-book {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      border-radius: 9999px;
      background: #202A36;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .btn-book:hover {
      background: #1a2229;
      transform: translateY(-1px);
    }

    /* Staggered entrance */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up-1 { animation: fadeUp 0.75s ease both; animation-delay: 0.1s; }
    .fade-up-2 { animation: fadeUp 0.75s ease both; animation-delay: 0.25s; }
    .fade-up-3 { animation: fadeUp 0.75s ease both; animation-delay: 0.4s; }
    .fade-up-4 { animation: fadeUp 0.75s ease both; animation-delay: 0.55s; }
    .fade-up-5 { animation: fadeUp 0.75s ease both; animation-delay: 0.7s; }

    /* Mobile menu */
    .mobile-menu-enter {
      animation: slideDown 0.22s ease both;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Subtle grain on overlay */
    .hero-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.35;
    }

    .scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #6b7280;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .scroll-hint span {
      display: block;
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, #9ca3af, transparent);
      animation: scrollLine 1.6s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0%   { transform: scaleY(0); transform-origin: top; opacity: 0; }
      40%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
      70%  { transform: scaleY(1); transform-origin: bottom; opacity: 1; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const NAV_ITEMS = [];

    function App() {
      const [menuOpen, setMenuOpen] = useState(false);

      // Close menu on resize to desktop
      useEffect(() => {
        const handler = () => { if (window.innerWidth >= 768) setMenuOpen(false); };
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);

      return (
        <div style={{ minHeight: '100vh', background: '#f9fafb' }}>
          {/* ─── HERO ─── */}
          <section style={{ position: 'relative', height: '100dvh', minHeight: '100vh', overflow: 'hidden' }}>

            {/* Video BG */}
            <video
              src="uploads/grok-video-0da4ba71-9e62-492f-ba0c-cfe56ca04897-2.mp4"
              autoPlay muted loop playsInline
            />

            {/* Overlay */}
            <div className="hero-overlay" />

            {/* Content wrapper */}
            <div style={{ position: 'relative', zIndex: 2, height: '100%', display: 'flex', flexDirection: 'column' }}>

              {/* ── NAV ── */}
              <nav style={{ width: '100%', position: 'relative', zIndex: 10 }}>
                <div style={{
                  maxWidth: '80rem',
                  margin: '0 auto',
                  padding: '24px 32px',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'space-between',
                }}>
                  {/* Brand */}
                  <a href="#" style={{
                    fontSize: '1.25rem',
                    fontWeight: 600,
                    color: '#fff',
                  }}>
                    Rowan Clyne
                  </a>

                  {/* Desktop nav */}
                  <div style={{ display: 'flex', gap: '36px', alignItems: 'center' }} className="desktop-nav">
                    {NAV_ITEMS.map(item => (
                      <a key={item} href="#" className="nav-link">{item}</a>
                    ))}
                  </div>



                  {/* Mobile hamburger */}
                  <button
                    className="mobile-only"
                    onClick={() => setMenuOpen(o => !o)}
                    style={{
                      background: 'none',
                      border: 'none',
                      cursor: 'pointer',
                      color: '#fff',
                      display: 'flex',
                      alignItems: 'center',
                      padding: '4px',
                    }}
                    aria-label="Toggle menu"
                  >
                    {menuOpen
                      ? <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      : <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    }
                  </button>
                </div>

                {/* Mobile dropdown */}
                {menuOpen && (
                  <div className="mobile-menu-enter" style={{
                    position: 'absolute',
                    top: '70px',
                    right: '32px',
                    background: 'rgba(255,255,255,0.50)',
                    backdropFilter: 'blur(12px)',
                    borderRadius: '12px',
                    boxShadow: '0 8px 30px rgba(0,0,0,0.12)',
                    padding: '8px 0',
                    minWidth: '160px',
                    overflow: 'hidden',
                  }}>
                    {['Focus', 'Philosophy', 'Contact'].map(item => (
                      <a key={item} href={`${item.toLowerCase()}.html`} style={{
                        display: 'block',
                        padding: '12px 24px',
                        color: '#111827',
                        textDecoration: 'none',
                        fontSize: '0.9rem',
                        fontWeight: 500,
                        textAlign: 'right',
                        transition: 'background 0.15s ease',
                      }}
                        onMouseEnter={e => e.target.style.background = '#f3f4f6'}
                        onMouseLeave={e => e.target.style.background = 'transparent'}
                      >{item}</a>
                    ))}

                  </div>
                )}
              </nav>

              {/* ── HERO CONTENT ── */}
              <div style={{
                flex: 1,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                marginTop: '-80px',
              }}>
                <div style={{ textAlign: 'center', padding: '0 24px' }}>


                  {/* Heading */}
                  <div className="fade-up-2" style={{ lineHeight: 1, marginBottom: '20px' }}>
                    <div style={{
                      fontFamily: "'Playfair Display', serif",
                      fontSize: 'clamp(3.5rem, 9vw, 6.5rem)',
                      fontWeight: 700,
                      color: '#6b7280',
                      letterSpacing: '-0.04em',
                      lineHeight: 1,
                    }}>
                      Publicity &
                    </div>
                    <div style={{
                      fontFamily: "'Playfair Display', serif",
                      fontSize: 'clamp(3.5rem, 9vw, 6.5rem)',
                      fontWeight: 700,
                      color: '#202A36',
                      letterSpacing: '-0.04em',
                      lineHeight: 1,
                      marginTop: '-12px',
                    }}>
                      Media Strategy
                    </div>
                  </div>

                  {/* Subtitle */}
                  <p className="fade-up-3" style={{
                    fontSize: 'clamp(1rem, 2.5vw, 1.2rem)',
                    color: '#fff',
                    margin: '0 auto 32px',
                    lineHeight: 1.6,
                    letterSpacing: '0.01em',
                  }}>
                    A legacy firm shaping the future of media.
                  </p>


                </div>
              </div>
            </div>

            {/* Scroll hint */}
            <div className="scroll-hint fade-up-5">
              <span />
            </div>
          </section>

          {/* ─── ABOUT SECTION ─── */}
          <section style={{
            background: '#f9fafb',
            padding: '72px 24px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
          }}>
            <div style={{ maxWidth: '640px', textAlign: 'center' }}>
              <h2 style={{
                fontSize: 'clamp(2.5rem, 6vw, 4rem)',
                fontWeight: 400,
                color: '#202A36',
                letterSpacing: '-0.03em',
                lineHeight: 1,
                marginBottom: '36px',
              }}>
                Unheard of.
              </h2>
              <p style={{
                fontSize: '1.05rem',
                color: '#4b5563',
                lineHeight: 1.75,
                fontWeight: 400,
                letterSpacing: '0.01em',
              }}>
                Founded in 1981, Rowan Clyne has quietly connected clients to the world for over four decades. By taking a boutique approach to brand communications, talent representation and entertainment publicity, we ensure the spotlight is always on our clients and partners.
              </p>
              <a href="contact.html" className="btn-book" style={{ marginTop: '36px', padding: '12px 32px', fontSize: '0.9rem', display: 'inline-flex', alignItems: 'center', textDecoration: 'none' }}>
                Let's talk.
              </a>
            </div>
          </section>

          {/* ─── FOOTER ─── */}
          <footer style={{
            background: '#f9fafb',
            padding: '24px',
            textAlign: 'center',
            borderTop: '1px solid #e5e7eb',
          }}>
            <p style={{
              fontSize: '0.75rem',
              color: '#9ca3af',
              letterSpacing: '0.04em',
            }}>
              © Rowan Clyne Publicity
            </p>
          </footer>
        </div>
      );
    }

    /* ── Responsive helpers ── */
    const styleTag = document.createElement('style');
    styleTag.textContent = `
      .desktop-nav { display: none; }
      .mobile-only  { display: flex; }
    `;
    document.head.appendChild(styleTag);

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
