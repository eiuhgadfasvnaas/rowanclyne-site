<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Rowan Clyne</title>
  <meta name="description" content="Get in touch with Rowan Clyne. hello@rowanclyne.com" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->

  <meta property="og:title" content="Contact — Rowan Clyne" />
  <meta property="og:description" content="Get in touch with Rowan Clyne. hello@rowanclyne.com" />
  <meta property="og:url" content="https://www.rowanclyne.com/contact" />
  <meta property="og:image" content="https://www.rowanclyne.com/uploads/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact — Rowan Clyne" />
  <meta name="twitter:description" content="Get in touch with Rowan Clyne. hello@rowanclyne.com" />
  <meta name="twitter:image" content="https://www.rowanclyne.com/uploads/og-image.jpg" />
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23202A36'/><text y='72' x='50' text-anchor='middle' font-size='58' font-family='serif' fill='white'>R</text></svg>" />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #202A36; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { opacity: 0; }
    .fade-up.visible { animation: fadeUp 0.75s ease forwards; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .menu-enter { animation: slideIn 0.22s ease both; }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #6b7280;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s ease;
    }
    .btn-back:hover { color: #202A36; }

    .hamburger-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #202A36;
      display: flex;
      align-items: center;
      padding: 4px;
    }

    .dropdown {
      position: absolute;
      top: 70px;
      right: 32px;
      background: rgba(255,255,255,0.50);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      padding: 8px 0;
      min-width: 160px;
      overflow: hidden;
      z-index: 100;
    }
    .dropdown a {
      display: block;
      padding: 12px 24px;
      color: #111827;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: right;
      transition: background 0.15s ease;
    }
    .dropdown a:hover { background: rgba(0,0,0,0.04); }

    /* Form */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9ca3af;
    }

    .form-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #d1d5db;
      padding: 10px 0;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      color: #202A36;
      outline: none;
      transition: border-color 0.2s ease;
      width: 100%;
    }
    .form-input::placeholder { color: #d1d5db; }
    .form-input:focus { border-color: #202A36; }

    textarea.form-input {
      resize: none;
      min-height: 120px;
    }

    .btn-submit {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 32px;
      border-radius: 9999px;
      background: #202A36;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .btn-submit:hover { background: #1a2229; transform: translateY(-1px); }

    .success-msg {
      font-size: 0.95rem;
      color: #4b5563;
      line-height: 1.7;
      padding: 24px 0;
      border-top: 1px solid #e5e7eb;
    }

    @media (max-width: 700px) {
      .contact-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function useFadeUp() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
        }, { threshold: 0.12 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    function App() {
      const [menuOpen, setMenuOpen] = useState(false);
      const [form, setForm] = useState({ name: '', email: '', message: '' });
      const [submitted, setSubmitted] = useState(false);
      const heroRef = useFadeUp();
      const formRef = useFadeUp();

      const handleSubmit = (e) => {
        e.preventDefault();
        if (form.name && form.email && form.message) setSubmitted(true);
      };

      return (
        <div style={{ minHeight: '100vh', background: '#f9fafb' }}>

          {/* NAV */}
          <nav style={{ position: 'relative', zIndex: 10 }}>
            <div style={{
              maxWidth: '72rem',
              margin: '0 auto',
              padding: '24px 32px',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
            }}>
              <a href="index.html" className="btn-back">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
                Rowan Clyne
              </a>

              <button className="hamburger-btn" onClick={() => setMenuOpen(o => !o)} aria-label="Toggle menu">
                {menuOpen
                  ? <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  : <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                }
              </button>

              {menuOpen && (
                <div className="menu-enter dropdown">
                  {['Focus', 'Philosophy', 'Contact'].map(item => (
                    <a key={item} href={`${item.toLowerCase()}.html`}>{item}</a>
                  ))}
                </div>
              )}
            </div>
          </nav>

          {/* HERO */}
          <header style={{ maxWidth: '72rem', margin: '0 auto', padding: '64px 32px 80px' }}>
            <div ref={heroRef} className="fade-up">
              <p style={{ fontSize: '0.7rem', fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#9ca3af', marginBottom: '16px' }}>
                Contact
              </p>
              <h1 style={{
                fontFamily: "'Playfair Display', serif",
                fontSize: 'clamp(3rem, 8vw, 6rem)',
                fontWeight: 700,
                color: '#202A36',
                letterSpacing: '-0.04em',
                lineHeight: 1,
                marginBottom: '24px',
              }}>
                We're easy to find.
              </h1>
              <h2 style={{
                fontFamily: "'Playfair Display', serif",
                fontSize: 'clamp(3rem, 8vw, 6rem)',
                fontWeight: 700,
                color: '#202A36',
                letterSpacing: '-0.04em',
                lineHeight: 1,
              }}>
                Just say hello.
              </h2>
            </div>
          </header>

          <main style={{ maxWidth: '72rem', margin: '0 auto', padding: '0 32px 120px' }}>
            <div ref={formRef} className="fade-up" style={{
              borderTop: '1px solid #e5e7eb',
              paddingTop: '64px',
            }}>
              <a href="mailto:hello@rowanclyne.com" style={{
                fontFamily: "'Playfair Display', serif",
                fontSize: 'clamp(1.4rem, 3vw, 2rem)',
                fontWeight: 700,
                color: '#202A36',
                textDecoration: 'underline',
                textUnderlineOffset: '4px',
                letterSpacing: '-0.02em',
                transition: 'color 0.2s ease',
              }}
                onMouseEnter={e => e.target.style.color = '#4b5563'}
                onMouseLeave={e => e.target.style.color = '#202A36'}
              >
                hello@rowanclyne.com
              </a>
            </div>
          </main>

          {/* FOOTER */}
          <footer style={{ borderTop: '1px solid #e5e7eb', padding: '24px 32px', textAlign: 'center' }}>
            <p style={{ fontSize: '0.75rem', color: '#9ca3af', letterSpacing: '0.04em' }}>
              © Rowan Clyne Publicity
            </p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
